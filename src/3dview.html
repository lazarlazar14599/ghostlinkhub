<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Preview</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:monospace;cursor:grab;
  background-color:#000;
  background-image:radial-gradient(circle,#242424 1.2px,transparent 1.2px);
  background-size:40px 40px;}
body.dragging{cursor:grabbing}
#wrap{perspective:1200px;width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;pointer-events:none}
#stage{transform-style:preserve-3d;transform:rotateX(-15deg) rotateY(20deg);width:1200px;height:600px;position:relative;pointer-events:none}
#card{position:absolute;inset:0;border-radius:4px;overflow:hidden;background:#0a0a0f;box-shadow:0 0 0 1px #1a1a1a,0 30px 100px rgba(0,0,0,.9);transform-style:preserve-3d;pointer-events:auto}
.e{position:absolute;background:#111}
.eb{width:100%;height:16px;bottom:-16px;left:0;transform:rotateX(-90deg) translateZ(8px);transform-origin:bottom center}
.et{width:100%;height:16px;top:-16px;left:0;transform:rotateX(90deg) translateZ(8px);transform-origin:top center}
.el{width:16px;height:100%;left:-16px;top:0;transform:rotateY(-90deg) translateZ(8px);transform-origin:left center}
.er{width:16px;height:100%;right:-16px;top:0;transform:rotateY(90deg) translateZ(8px);transform-origin:right center}
#preview{position:absolute;inset:0;width:100%;height:100%;border:none;display:block}
#shield{position:absolute;inset:0;z-index:10;display:none;cursor:grabbing}
body.dragging #shield{display:block}
#coords{position:fixed;bottom:14px;right:14px;color:#2a2a2a;font-size:10px;letter-spacing:1px}
body:hover #coords{color:#555}
</style>
</head>
<body>
<div id="wrap"><div id="stage"><div id="card">
  <div class="e eb"></div><div class="e et"></div>
  <div class="e el"></div><div class="e er"></div>
  <iframe id="preview" srcdoc="<script> 
(async () => { 
    const url = &quot;https://cdn.jsdelivr.net/gh/virtuan4-max/ghostlinkhub@latest/ghostlinksinglefile.html?v=&quot; + Date.now();
    const response = await fetch(url); 
    const html = await response.text(); 
    document.open(); 
    document.write(html); 
    document.close(); 
})(); 
</script>"></iframe>
  <div id="shield"></div>
</div></div></div>
<div id="coords">rotX: 0° · rotY: 0°</div>
<script>
(function(){
const stage=document.getElementById('stage'),
  card=document.getElementById('card'),
  co=document.getElementById('coords');

let rX=0,rY=0,z=1,drag=false,lx=0,ly=0;

function apply(){
  stage.style.transform=`rotateX(${rX}deg) rotateY(${rY}deg) scale(${z})`;
  co.textContent=`rotX:${rX.toFixed(1)}° · rotY:${rY.toFixed(1)}°`;
}
apply();

document.body.addEventListener('mousedown', e => {
  drag = true;
  lx = e.clientX;
  ly = e.clientY;
  document.body.classList.add('dragging');
  e.preventDefault();
});

window.addEventListener('mousemove', e => {
  if (!drag) return;
  rY += (e.clientX - lx) * .45;
  rX -= (e.clientY - ly) * .45;
  rX = Math.max(-85, Math.min(85, rX));
  lx = e.clientX;
  ly = e.clientY;
  apply();
});

function stopDrag() {
  drag = false;
  document.body.classList.remove('dragging');
}
window.addEventListener('mouseup', stopDrag);
window.addEventListener('mouseleave', stopDrag);

document.body.addEventListener('wheel', e => {
  e.preventDefault();
  z -= e.deltaY * .001;
  z = Math.max(.2, Math.min(3, z));
  apply();
}, {passive: false});

window.addEventListener('keydown', e => {
  if (e.key === 'r' || e.key === 'R') { rX=-15; rY=20; z=1; apply(); }
});
})();
</script>
</body>
</html>
