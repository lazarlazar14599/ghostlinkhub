  <style>
/* ═══════════════════════════════════════════════════
   GhostLink Browser — style.css v6
   Follows the GhostLink Style Guide precisely.
   Pure #000. One accent. Monospace everywhere.
   ═══════════════════════════════════════════════════ */

/* ── VARIABLES ── */
:root {
  --bg:             #000000;
  --sidebar-bg:     var(--bg);
  --accent:         #6ecbff;
  --accent-glow:    rgba(110, 203, 255, 0.3);
  --text-primary:   #ffffff;
  --text-dim:       #94a3b8;
  --border:         rgba(110, 203, 255, 0.08);
  --font:           'Courier New', monospace;
  --card-bg:        rgba(255, 255, 255, 0.03);
  --input-bg:       rgba(255, 255, 255, 0.05);
  --bg-image:       none;
  --bg-blur:        0px;
  --bg-brightness:  100%;
}

/* ── GLOBAL RESET ── */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

/* ── SCROLLBARS — thin, accent, transparent track ── */
::-webkit-scrollbar        { width: 6px; height: 6px; }
::-webkit-scrollbar-track  { background: transparent; }
::-webkit-scrollbar-thumb  { background: var(--accent); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent); }
* { scrollbar-width: thin; scrollbar-color: var(--accent) transparent; }

/* ── PAGE SHELL ── */
body {
  display: flex;
  height: 100vh;
  overflow: hidden;
  background-color: var(--bg);
  font-family: var(--font);
  color: var(--text-primary);
  position: relative;
}

/* #app fills body */
#app {
  display: flex;
  flex: 1;
  width: 100%;
  height: 100%;
}

/* Wallpaper layer — fully decoupled from content */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image: var(--bg-image);
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  filter: blur(var(--bg-blur)) brightness(var(--bg-brightness));
  z-index: -1;
  pointer-events: none;
}

/* ════════════════════════════════════════════════
   BROWSER LAYOUT
   ════════════════════════════════════════════════ */

.browser-container {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  background: var(--bg);
}

/* ── BROWSER TABS ROW ── */
.browser-tabs {
  display: flex;
  align-items: center;
  padding: 12px 16px 0;
  gap: 6px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  overflow-x: auto;
  scrollbar-width: none;
  min-height: 68px;
}
.browser-tabs::-webkit-scrollbar { display: none; }

/* Individual browser tab */
.tab {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 22px 10px 16px;
  min-width: 180px;
  max-width: 280px;
  background: transparent;
  border: 1px solid rgba(255, 255, 255, 0.15);
  border-bottom: none;
  border-radius: 10px 10px 0 0;
  cursor: pointer;
  transition: 0.2s;
  font-family: var(--font);
  position: relative;
  flex-shrink: 0;
}

.tab:hover {
  background: rgba(255, 255, 255, 0.05);
  border-color: var(--border);
}

.tab.active {
  background: rgba(255, 255, 255, 0.05);
  border-color: var(--accent);
  border-bottom-color: var(--bg);
}

.tab.active::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
}

.tab.active::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 0;
  right: 0;
  height: 1px;
  background: var(--bg);
}

.tab-favicon {
  width: 18px;
  height: 18px;
  border-radius: 3px;
  flex-shrink: 0;
}

.tab-title {
  flex: 1;
  font-size: 0.85rem;
  font-family: var(--font);
  color: var(--text-dim);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.tab.active .tab-title {
  color: var(--accent);
  text-shadow: 0 0 10px var(--accent-glow);
}

/* Close — danger red on hover, never accent */
.tab-close {
  font-size: 16px;
  color: var(--text-dim);
  cursor: pointer;
  padding: 3px 6px;
  border-radius: 4px;
  transition: 0.2s;
  line-height: 1;
  flex-shrink: 0;
}
.tab-close:hover {
  background: rgba(255, 68, 68, 0.15);
  color: #ff4444;
}

/* New tab button — close/icon button spec: 30x30, border, 6px radius */
.new-tab {
  width: 30px;
  height: 30px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-dim);
  border-radius: 6px;
  cursor: pointer;
  transition: 0.2s;
  font-size: 16px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font);
}
.new-tab:hover {
  border-color: var(--accent);
  color: var(--accent);
  box-shadow: 0 0 10px var(--accent-glow);
}

/* ── NAV BAR ── */
.nav {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 16px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

/* Nav buttons — close/icon button spec: 30x30, border, 6px radius */
.nav button {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 30px;
  height: 30px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-dim);
  cursor: pointer;
  transition: 0.2s;
  font-size: 13px;
  font-family: var(--font);
  flex-shrink: 0;
}
.nav button:hover {
  border-color: var(--accent);
  color: var(--accent);
  box-shadow: 0 0 10px var(--accent-glow);
}

/* ── ADDRESS BAR ── */
.address-wrapper {
  flex: 1;
  position: relative;
  display: flex;
  align-items: center;
}

/* Address bar — search bar spec: input-bg, border, 12px radius */
input.bar {
  width: 100%;
  height: 36px;
  padding: 0 40px 0 16px;
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text-primary);
  font-size: 1rem;
  font-family: var(--font);
  outline: none;
  transition: 0.2s;
  backdrop-filter: blur(5px);
  color-scheme: dark;
}
input.bar:focus {
  border-color: var(--accent);
  background: rgba(255, 255, 255, 0.08);
  box-shadow: 0 0 10px var(--accent-glow);
}
input.bar::placeholder {
  color: var(--text-dim);
  opacity: 0.5;
}

/* Home button inside address bar — close/icon button spec */
#home-btn-nav {
  position: absolute;
  right: 6px;
  width: 30px;
  height: 30px;
  background: transparent;
  border: none;
  color: var(--text-dim);
  border-radius: 6px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  padding: 0;
  transition: 0.2s;
}
#home-btn-nav:hover { color: var(--accent); }

/* ── LOADING BAR ── */
.loading-bar-container {
  height: 2px;
  background: transparent;
  flex-shrink: 0;
}
.loading-bar {
  height: 100%;
  width: 0%;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent-glow);
  transition: width 0.2s ease, opacity 0.15s;
}

/* ── IFRAME CONTAINER ── */
.iframe-container {
  flex: 1;
  position: relative;
  background: var(--bg);
  overflow: hidden;
}

.iframe-container iframe {
  width: 100%;
  height: 100%;
  border: none;
  position: absolute;
  top: 0;
  left: 0;
}

.iframe-container iframe.hidden { display: none; }

.iframe-container iframe.loading {
  filter: blur(12px);
  transition: filter 0.4s ease;
}

/* ════════════════════════════════════════════════
   MESSAGE / LOADING OVERLAY
   Modal/overlay spec: fixed, inset 0, rgba(0,0,0,0.88),
   backdrop-filter blur(12px), z-index 9999, fadeIn 0.4s
   ════════════════════════════════════════════════ */

.message-container {
  display: flex;
  align-items: center;
  justify-content: center;
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: rgba(0, 0, 0, 0.88);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Modal box spec: card-bg, 1px solid accent, 16px radius, glow shadow */
.message-content {
  max-width: 380px;
  width: 90%;
  padding: 32px;
  background: var(--card-bg);
  border: 1px solid var(--accent);
  border-radius: 16px;
  box-shadow: 0 0 60px var(--accent-glow), 0 0 20px rgba(0,0,0,0.8);
  text-align: center;
  backdrop-filter: blur(10px);
}

/* Section H2 spec */
.message-content h1 {
  font-family: var(--font);
  font-size: 1.2rem;
  font-weight: bold;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 10px;
  text-shadow: 0 0 10px var(--accent-glow);
}

/* Body/description spec: 0.85rem, text-dim, line-height 1.7 */
.message-content p {
  font-family: var(--font);
  color: var(--text-dim);
  font-size: 0.85rem;
  word-break: break-all;
  line-height: 1.7;
}

/* Spinner */
.spinner {
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  width: 26px;
  height: 26px;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 20px;
  box-shadow: 0 0 10px var(--accent-glow);
}

@keyframes spin { to { transform: rotate(360deg); } }

/* Tab loading spinner */
.tab-spinner {
  width: 15px;
  height: 15px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  flex-shrink: 0;
}

/* Skip / Retry buttons — small action button spec */
#skip-btn, #retry-btn {
  display: none;
  margin-top: 20px;
  padding: 8px 10px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-dim);
  cursor: pointer;
  font-family: var(--font);
  font-size: 0.75rem;
  letter-spacing: 1px;
  text-transform: uppercase;
  transition: 0.2s;
}
#skip-btn:hover, #retry-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  box-shadow: 0 0 8px var(--accent-glow);
}

/* ════════════════════════════════════════════════
   SETTINGS MODAL
   ════════════════════════════════════════════════ */

/* Overlay backdrop spec */
.wisp-settings-modal {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.88);
  backdrop-filter: blur(12px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  animation: fadeIn 0.2s ease;
}
.wisp-settings-modal.hidden { display: none; }

/* Modal box spec: card-bg, 1px solid accent, 16px radius, glow shadow */
.settings-card {
  background: var(--card-bg);
  width: 420px;
  max-width: 92vw;
  max-height: 82vh;
  border-radius: 16px;
  border: 1px solid var(--accent);
  box-shadow: 0 0 60px var(--accent-glow), 0 0 20px rgba(0,0,0,0.8);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  backdrop-filter: blur(10px);
}

/* Modal header — border-bottom separates sections */
.settings-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 22px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

/* Section H2 spec: accent, bold, uppercase, letter-spacing */
.settings-header h2 {
  font-family: var(--font);
  font-size: 1.2rem;
  font-weight: bold;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 1px;
  text-shadow: 0 0 10px var(--accent-glow);
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 0;
}

/* Close button spec: 30×30, border, 6px radius, text-dim → accent on hover */
.close-btn {
  width: 30px;
  height: 30px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-dim);
  border-radius: 6px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  transition: 0.2s;
}
.close-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  box-shadow: 0 0 8px var(--accent-glow);
}

.settings-content {
  padding: 20px;
  overflow-y: auto;
  flex: 1;
}

/* Label spec: 0.8rem, text-dim, uppercase, letter-spacing 1px */
.section-title {
  font-family: var(--font);
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.server-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 20px;
}

/* HUD card spec */
.wisp-option {
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding: 15px;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  cursor: pointer;
  transition: 0.2s;
  backdrop-filter: blur(12px) saturate(180%);
  font-size: 11px;
  color: var(--text-dim);
  line-height: 2;
}
.wisp-option:hover {
  border-color: var(--accent);
  background: rgba(255, 255, 255, 0.05);
}
.wisp-option.active {
  border-color: var(--accent);
  background: rgba(255, 255, 255, 0.05);
  box-shadow: 0 0 15px var(--accent-glow);
}

.wisp-option-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* Card title spec: 1.2rem bold text-primary — scaled down for density */
.wisp-option-name {
  font-family: var(--font);
  font-size: 0.85rem;
  font-weight: bold;
  color: var(--text-primary);
  display: flex;
  align-items: center;
}
.wisp-option.active .wisp-option-name { color: var(--accent); }

/* Tiny metadata spec */
.wisp-option-url {
  font-family: var(--font);
  font-size: 0.72rem;
  color: var(--text-dim);
}

.server-status {
  display: flex;
  align-items: center;
  gap: 6px;
}

/* Tiny metadata spec */
.ping-text {
  font-family: var(--font);
  font-size: 0.72rem;
  color: var(--text-dim);
}

.status-indicator {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--text-dim);
  flex-shrink: 0;
}
.status-indicator.status-success {
  background: #22c55e;
  box-shadow: 0 0 5px rgba(34,197,94,0.5);
}
.status-indicator.status-error {
  background: #ff4444;
  box-shadow: 0 0 5px rgba(255,68,68,0.5);
}

/* Custom server input group */
.custom-input-group {
  display: flex;
  gap: 8px;
}

/* Input spec */
.custom-input-group input {
  flex: 1;
  padding: 12px;
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-primary);
  font-family: var(--font);
  font-size: 0.85rem;
  outline: none;
  transition: 0.2s;
  backdrop-filter: blur(5px);
  color-scheme: dark;
}
.custom-input-group input:focus {
  border-color: var(--accent);
  background: rgba(255, 255, 255, 0.08);
}
.custom-input-group input::placeholder {
  color: var(--text-dim);
  opacity: 0.5;
}

/* Primary CTA spec: accent bg, #000 text, bold, 8px radius */
.custom-input-group button {
  padding: 14px 32px;
  background: var(--accent);
  border: none;
  border-radius: 8px;
  color: #000;
  cursor: pointer;
  font-family: var(--font);
  font-weight: bold;
  font-size: 0.75rem;
  letter-spacing: 1px;
  text-transform: uppercase;
  transition: 0.2s;
}
.custom-input-group button:hover {
  box-shadow: 0 0 10px var(--accent-glow);
}

/* Modal footer */
.settings-footer {
  padding: 14px 22px;
  border-top: 1px solid var(--border);
  color: var(--text-dim);
  font-family: var(--font);
  font-size: 0.8rem;
  letter-spacing: 1px;
  text-transform: uppercase;
  flex-shrink: 0;
}

/* Delete / danger button spec */
.delete-wisp-btn {
  background: transparent;
  border: 1px solid rgba(255, 68, 68, 0.4);
  color: #ff4444;
  border-radius: 6px;
  cursor: pointer;
  font-family: var(--font);
  font-size: 0.75rem;
  padding: 8px 10px;
  transition: 0.2s;
  margin-left: 6px;
}
.delete-wisp-btn:hover { background: rgba(255, 68, 68, 0.15); }

/* ════════════════════════════════════════════════
   TOGGLE SWITCH
   ════════════════════════════════════════════════ */

.toggle-switch {
  width: 36px;
  height: 18px;
  background: var(--border);
  border-radius: 9px;
  position: relative;
  cursor: pointer;
  transition: 0.2s;
  flex-shrink: 0;
  border: 1px solid var(--border);
}
.toggle-switch.active {
  background: rgba(110, 203, 255, 0.25);
  border-color: var(--accent);
  box-shadow: 0 0 8px var(--accent-glow);
}
.toggle-knob {
  width: 12px;
  height: 12px;
  background: var(--text-dim);
  border-radius: 50%;
  position: absolute;
  top: 2px;
  left: 2px;
  transition: 0.2s;
}
.toggle-switch.active .toggle-knob {
  transform: translateX(18px);
  background: var(--accent);
}
  </style>
</head>

  <!-- Proxy Settings Modal -->
  <div class="wisp-settings-modal hidden" id="wisp-settings-modal">

          <input type="text" id="custom-wisp-input" placeholder="wss://your-server.com/wisp/" spellcheck="false">
          <button id="save-custom-wisp"><i class="fa-solid fa-plus"></i></button>

      </div>
      <div class="settings-footer">
        <i class="fa-solid fa-bolt" style="color:var(--accent);margin-right:6px"></i>Lower ping = faster browsing
      </div>
    </div>
  </div>

  <!-- ── INLINED NT.HTML as a template (used to create Blob URL at runtime) ── -->

    }

    ::-webkit-scrollbar        { width: 6px; height: 6px; }

    function navigate(url) {
      if (window.parent && window.parent !== window) {

      } else {
        document.getElementById('loader').classList.add('show');
        window.location.href = url;

    document.getElementById('searchForm').onsubmit = e => {

    const DEFAULT_SHORTCUTS = [

    function renderShortcuts() {
      const container = document.getElementById('shortcuts');

      getShortcuts().forEach((s, i) => {
        const el = document.createElement('div');
        el.className = 'shortcut';
        el.style.animationDelay = (i * 0.04 + 0.04) + 's';
        el.innerHTML = `

            <i class="fa-solid fa-link" style="display:none"></i>

        container.appendChild(el);
      });
    }
    renderShortcuts();
    const closeModal = () => document.getElementById('addModal').classList.add('hidden');

      const list = getShortcuts();
      list.push({ label, url, icon });
      saveShortcuts(list);
      closeModal();
      document.getElementById('newLabel').value = '';
      document.getElementById('newUrl').value = '';
      renderShortcuts();
    };

  <script>
    // ── NT.HTML INLINE BLOB ──
    // NT.html is inlined as a blob URL so the iframe src resolves correctly.
    (function() {
      const ntTemplate = document.getElementById('nt-html-template');

  <script>
    // ── INLINED script.js ──
    // All references to "NT.html" are replaced at runtime via __ntBlobURL.

    // WISP servers are fetched from the remote hub; placeholders until loaded
    let WISP_SERVERS = [];
    let DEFAULT_WISP = window.SITE_CONFIG?.defaultWisp ?? null;

    async function fetchWispServers() {
        try {
            const res = await fetch("https://cdn.jsdelivr.net/gh/virtuan4-max/ghostlinkhub@main/proxy/wisps.html");
            const text = await res.text();
            const match = text.match(/const\s+WISP_SERVERS\s*=\s*(\[[\s\S]*?\]);/);
            if (match) {
                WISP_SERVERS = (new Function('return ' + match[1]))();
            }
        } catch (e) {
            console.warn("Failed to fetch wisp server list:", e);
        }
        if (!WISP_SERVERS.length) {
            WISP_SERVERS = [{ name: "Wisp 1", url: "wss://i-ready.math.bostoncareercounselor.com/wisp/" }];
        }
        if (!DEFAULT_WISP) DEFAULT_WISP = WISP_SERVERS[0].url;
        if (!localStorage.getItem("proxServer")) {
            localStorage.setItem("proxServer", DEFAULT_WISP);
        }
    }

    // Helper to get all servers (config + custom)
    function getAllWispServers() {
        const customWisps = getStoredWisps();
        return [...WISP_SERVERS, ...customWisps];
    }

    // =====================================================
    // PROACTIVE SERVER HEALTH CHECKING
    // =====================================================

    // Ping a wisp server to check if it's responsive
    async function pingWispServer(url, timeout = 2000) {
        return new Promise((resolve) => {
            const start = Date.now();
            try {
                const ws = new WebSocket(url);
                const timer = setTimeout(() => {
                    try { ws.close(); } catch {}
                    resolve({ url, success: false, latency: null });
                }, timeout);

                ws.onopen = () => {
                    clearTimeout(timer);
                    const latency = Date.now() - start;
                    try { ws.close(); } catch {}
                    resolve({ url, success: true, latency });
                };

                ws.onerror = () => {
                    clearTimeout(timer);
                    try { ws.close(); } catch {}
                    resolve({ url, success: false, latency: null });
                };
            } catch {
                resolve({ url, success: false, latency: null });
            }
        });
    }

    // Find the best (fastest working) server from the list
    async function findBestWispServer(servers, currentUrl) {
        if (!servers || servers.length === 0) return currentUrl;

        // Ping all servers in parallel (faster than sequential)
        const results = await Promise.all(
            servers.map(s => pingWispServer(s.url, 2000))
        );

        // Filter to only working servers and sort by latency
        const working = results
            .filter(r => r.success)
            .sort((a, b) => a.latency - b.latency);

        if (working.length > 0) {
            return working[0].url;
        }

        // If none working, return current or first
        return currentUrl || servers[0]?.url;
    }

    // Proactively check and switch to best server on init
    async function initializeWithBestServer() {
        const autoswitch = localStorage.getItem('wispAutoswitch') !== 'false';
        const allServers = getAllWispServers();

        if (!autoswitch || allServers.length <= 1) {
            return;
        }

        const currentUrl = localStorage.getItem("proxServer") || DEFAULT_WISP;
        
        // Check if current server is working, if not find a better one
        const currentCheck = await pingWispServer(currentUrl, 2000);
        
        if (currentCheck.success) {
            console.log("Init: Current server is working:", currentUrl, currentCheck.latency + "ms");
            return;
        }

        // Current server is bad, find the fastest working server
        console.log("Init: Current server not responding, finding better server...");
        const best = await findBestWispServer(allServers, currentUrl);
        
        if (best && best !== currentUrl) {
            console.log("Init: Auto-switching to faster server:", best);
            localStorage.setItem("proxServer", best);
            const serverName = allServers.find(s => s.url === best)?.name || 'Faster Server';
            notify('info', 'Auto-switched', `Using ${serverName} for best performance`);
        }
    }

    // =====================================================
    // BROWSER STATE
    // =====================================================
    // NOTE: window.BareMux is set by a <script type="module"> which is deferred.
    // We must NOT capture it here (parse time) — read it lazily at call time instead.
    const getBareMux = () => window.BareMux ?? null;

    // SINGLETON: Shared resources for all tabs (prevents connection exhaustion)
    let sharedScramjet = null;
    let sharedConnection = null;
    let sharedConnectionReady = false;

    let tabs = [];
    let activeTabId = null;
    let nextTabId = 1;

    // =====================================================
    // UTILITIES
    // =====================================================
    const getBasePath = () => {
        const basePath = location.pathname.replace(/[^/]*$/, '');
        return basePath.endsWith('/') ? basePath : basePath + '/';
    };

    const getStoredWisps = () => {
        try { return JSON.parse(localStorage.getItem('customWisps') ?? '[]'); }
        catch { return []; }
    };

    const getActiveTab = () => tabs.find(t => t.id === activeTabId);

    const notify = (type, title, message) => {
        if (typeof Notify !== 'undefined') {
            Notify[type](title, message);
        }
    };

    // =====================================================
    // INITIALIZATION
    // =====================================================
    async function getSharedScramjet() {
        if (sharedScramjet) return sharedScramjet;

        if (typeof $scramjetLoadController === 'undefined') {
            throw new Error("Scramjet not loaded. The CDN script may have failed to load.");
        }

        const basePath = getBasePath();
        const { ScramjetController } = $scramjetLoadController();
        
        sharedScramjet = new ScramjetController({
            prefix: basePath + "scramjet/",
            files: {
                wasm: "https://cdn.jsdelivr.net/gh/Destroyed12121/Staticsj@main/JS/scramjet.wasm.wasm",
                all: "https://cdn.jsdelivr.net/gh/Destroyed12121/Staticsj@main/JS/scramjet.all.js",
                sync: "https://cdn.jsdelivr.net/gh/Destroyed12121/Staticsj@main/JS/scramjet.sync.js"
            }
        });
        
        try {
            await sharedScramjet.init();
        } catch (err) {
            // Handle IndexedDB schema errors by clearing cache and retrying
            if (err.message && err.message.includes('IDBDatabase') || err.message && err.message.includes('object stores')) {
                console.warn('Scramjet IndexedDB error, clearing cache and retrying...');
                
                // Clear IndexedDB for Scramjet
                try {
                    const dbNames = ['scramjet-data', 'scrambase', 'ScramjetData'];
                    for (const dbName of dbNames) {
                        const req = indexedDB.deleteDatabase(dbName);
                        req.onsuccess = () => console.log(`Cleared IndexedDB: ${dbName}`);
                        req.onerror = () => console.warn(`Failed to clear IndexedDB: ${dbName}`);
                    }
                } catch (clearErr) {
                    console.warn('Failed to clear IndexedDB:', clearErr);
                }
                
                // Reset shared instance and retry
                sharedScramjet = null;
                return getSharedScramjet();
            }
            throw err;
        }
        
        return sharedScramjet;
    }

    async function getSharedConnection() {
        if (sharedConnectionReady) return sharedConnection;

        const wispUrl = localStorage.getItem("proxServer") ?? DEFAULT_WISP;
        
        // Read BareMux lazily — window.BareMux is set by the deferred module import
        const BM = getBareMux();
        if (!BM) throw new Error("BareMux not loaded yet. The bare-mux module import may have failed.");

        sharedConnection = new BM.BareMuxConnection(getBasePath() + "bareworker.js");
        await sharedConnection.setTransport(
            "https://cdn.jsdelivr.net/npm/@mercuryworkshop/epoxy-transport@2.1.28/dist/index.mjs",
            [{ wisp: wispUrl }]
        );
        sharedConnectionReady = true;
        return sharedConnection;
    }

                            <p id="error-message">An error occurred.</p>
                        </div>
                    </div>
                </div>
            </div>`;

        // Cache DOM elements
        const elements = {
            backBtn: document.getElementById('back-btn'),
            fwdBtn: document.getElementById('fwd-btn'),
            reloadBtn: document.getElementById('reload-btn'),
            addrBar: document.getElementById('address-bar'),
            skipBtn: document.getElementById('skip-btn')
        };

        // Bind navigation events
        elements.backBtn.onclick = () => getActiveTab()?.frame.back();
        elements.fwdBtn.onclick = () => getActiveTab()?.frame.forward();
        elements.reloadBtn.onclick = () => getActiveTab()?.frame.reload();
        document.getElementById('home-btn-nav').onclick = () => window.location.href = getBasePath() + 'index.html';
        document.getElementById('devtools-btn').onclick = toggleDevTools;
        document.getElementById('wisp-settings-btn').onclick = openSettings;

        // Skip button logic
        elements.skipBtn.onclick = () => {
            const tab = getActiveTab();
            if (tab) {
                tab.loading = false;
                showIframeLoading(false);
            }
        };

        // Address bar events
        elements.addrBar.onkeyup = (e) => e.key === 'Enter' && handleSubmit();
        elements.addrBar.onfocus = () => elements.addrBar.select();

        // Handle navigation messages
        window.addEventListener('message', (e) => {
            if (e.data?.type === 'navigate') handleSubmit(e.data.url);
        });

        createTab(true);
        checkHashParameters();
    }

    // =====================================================
    // TAB MANAGEMENT
    // =====================================================
    function createTab(makeActive = true) {
        const frame = sharedScramjet.createFrame();
        const tab = {
            id: nextTabId++,
            title: "New Tab",
            url: "NT.html",
            frame,
            loading: false,
            favicon: null,
            skipTimeout: null,
            loadStartTime: null
        };

        // Use the blob URL for NT.html instead of a file path
        frame.frame.src = window.__ntBlobURL;

        frame.addEventListener("urlchange", (e) => {
            tab.url = e.url;
            tab.loading = true;
            tab.loadStartTime = Date.now();

            if (tab.id === activeTabId) {
                showIframeLoading(true, tab.url);
            }

            try {
                const urlObj = new URL(e.url);
                tab.title = urlObj.hostname;
                tab.favicon = `https://www.google.com/s2/favicons?domain=${urlObj.hostname}&sz=32`;
            } catch {
                tab.title = "Browsing";
                tab.favicon = null;
            }
            
            updateTabsUI();
            updateAddressBar();
            updateLoadingBar(tab, 10);

            if (tab.skipTimeout) clearTimeout(tab.skipTimeout);
            tab.skipTimeout = setTimeout(() => {
                if (tab.loading && tab.id === activeTabId) {
                    document.getElementById('skip-btn')?.style.setProperty('display', 'inline-block');
                }
            }, 200);

            // Fallback: if the load event never fires (SPA/redirect navigation),
            // auto-clear the loading state after 7 seconds so the spinner doesn't hang forever.
            if (tab.loadFallbackTimeout) clearTimeout(tab.loadFallbackTimeout);
            tab.loadFallbackTimeout = setTimeout(() => {
                if (tab.loading) {
                    tab.loading = false;
                    clearTimeout(tab.skipTimeout);
                    if (tab.id === activeTabId) showIframeLoading(false);
                    updateTabsUI();
                    updateLoadingBar(tab, 100);
                }
            }, 2000);
        });

        frame.frame.addEventListener('load', () => {
            tab.loading = false;
            clearTimeout(tab.skipTimeout);
            clearTimeout(tab.loadFallbackTimeout);

            if (tab.id === activeTabId) {
                showIframeLoading(false);
            }

            try {
                const title = frame.frame.contentWindow.document.title;
                if (title) tab.title = title;
            } catch { }

            // Check for NT blob URL or NT.html in href
            const href = frame.frame.contentWindow?.location?.href || '';
            if (href === window.__ntBlobURL || href.includes('NT.html')) {
                tab.title = "New Tab";
                tab.url = "";
                tab.favicon = null;
            }

            updateTabsUI();
            updateAddressBar();
            updateLoadingBar(tab, 100);
        });

        tabs.push(tab);
        document.getElementById("iframe-container").appendChild(frame.frame);
        if (makeActive) switchTab(tab.id);
        return tab;
    }

    function showIframeLoading(show, url = '') {
        const loader = document.getElementById("loading");
        if (!loader) return;

        loader.style.display = show ? "flex" : "none";
        getActiveTab()?.frame.frame.classList.toggle('loading', show);

        if (show) {
            document.getElementById("loading-title").textContent = "Connecting";
            document.getElementById("loading-url").textContent = url || "Loading content...";
            document.getElementById("skip-btn").style.display = 'none';
        }
    }

    function switchTab(tabId) {
        activeTabId = tabId;
        const tab = getActiveTab();

        tabs.forEach(t => t.frame.frame.classList.toggle("hidden", t.id !== tabId));

        if (tab) {
            showIframeLoading(tab.loading, tab.url);
            
            const skipBtn = document.getElementById('skip-btn');
            if (tab.loading && tab.loadStartTime && skipBtn) {
                const elapsed = Date.now() - tab.loadStartTime;
                if (elapsed > 3000) skipBtn.style.display = 'inline-block';
            }
        }

        updateTabsUI();
        updateAddressBar();
    }

    function closeTab(tabId) {
        const idx = tabs.findIndex(t => t.id === tabId);
        if (idx === -1) return;

        const tab = tabs[idx];
        clearTimeout(tab.skipTimeout);
        clearTimeout(tab.loadFallbackTimeout);
        
        if (tab.frame?.frame) {
            tab.frame.frame.src = 'about:blank';
            tab.frame.frame.remove();
        }
        
        tabs.splice(idx, 1);

        if (activeTabId === tabId) {
            if (tabs.length > 0) switchTab(tabs[Math.max(0, idx - 1)].id);
            else window.location.reload();
        } else {
            updateTabsUI();
        }
    }

    function updateTabsUI() {
        const container = document.getElementById("tabs-container");
        container.innerHTML = "";

        tabs.forEach(tab => {
            const el = document.createElement("div");
            el.className = `tab ${tab.id === activeTabId ? "active" : ""}`;

            const iconHtml = tab.loading 
                ? `<div class="tab-spinner"></div>`
                : tab.favicon 
                    ? `<img src="${tab.favicon}" class="tab-favicon" onerror="this.style.display='none'">`
                    : '';

            el.innerHTML = `${iconHtml}<span class="tab-title">${tab.title}</span><span class="tab-close">&times;</span>`;
            el.onclick = () => switchTab(tab.id);
            el.querySelector(".tab-close").onclick = (e) => { e.stopPropagation(); closeTab(tab.id); };
            container.appendChild(el);
        });

        const newBtn = document.createElement("button");
        newBtn.className = "new-tab";
        newBtn.innerHTML = "<i class='fa-solid fa-plus'></i>";
        newBtn.onclick = () => createTab(true);
        container.appendChild(newBtn);
    }

    function updateAddressBar() {
        const bar = document.getElementById("address-bar");
        const tab = getActiveTab();
        if (bar && tab) {
            bar.value = (tab.url && !tab.url.includes("NT.html") && tab.url !== window.__ntBlobURL) ? tab.url : "";
        }
    }

    function handleSubmit(url) {
        const tab = getActiveTab();
        let input = url ?? document.getElementById("address-bar").value.trim();
        if (!input) return;

        if (!input.startsWith('http')) {
            input = input.includes('.') && !input.includes(' ') 
                ? `https://${input}`
                : `https://www.bing.com/search?q=${encodeURIComponent(input)}`;
        }
        
        tab.loading = true;
        showIframeLoading(true, input);
        updateLoadingBar(tab, 10);
        tab.frame.go(input);
    }

    function updateLoadingBar(tab, percent) {
        if (tab.id !== activeTabId) return;
        const bar = document.getElementById("loading-bar");
        bar.style.width = percent + "%";
        bar.style.opacity = percent === 100 ? "0" : "1";
        if (percent === 100) setTimeout(() => { bar.style.width = "0%"; }, 200);
    }

    // =====================================================
    // SETTINGS & WISP
    // =====================================================
    function openSettings() {
        const modal = document.getElementById('wisp-settings-modal');
        modal.classList.remove('hidden');

        document.getElementById('close-wisp-modal').onclick = () => modal.classList.add('hidden');
        document.getElementById('save-custom-wisp').onclick = saveCustomWisp;
        modal.onclick = (e) => { if (e.target === modal) modal.classList.add('hidden'); };

        renderServerList();
    }

    function renderServerList() {
        const list = document.getElementById('server-list');
        list.innerHTML = '';

        const currentUrl = localStorage.getItem('proxServer') ?? DEFAULT_WISP;
        const allWisps = [...WISP_SERVERS, ...getStoredWisps()];

        allWisps.forEach((server, index) => {
            const isActive = server.url === currentUrl;
            const isCustom = index >= WISP_SERVERS.length;

            const item = document.createElement('div');
            item.className = `wisp-option ${isActive ? 'active' : ''}`;

            const deleteBtn = isCustom
                ? `<button class="delete-wisp-btn" onclick="event.stopPropagation(); deleteCustomWisp('${server.url}')"><i class="fa-solid fa-trash"></i></button>`
                : '';

            item.innerHTML = `
                <div class="wisp-option-header">
                    <div class="wisp-option-name">
                        ${server.name}
                        ${isActive ? '<i class="fa-solid fa-check" style="margin-left:8px; font-size: 0.7em; color: var(--accent);"></i>' : ''}
                    </div>
                    <div class="server-status">
                        <span class="ping-text">...</span>
                        <div class="status-indicator"></div>
                        ${deleteBtn}
                    </div>
                </div>
                <div class="wisp-option-url">${server.url}</div>
            `;

            item.onclick = () => setWisp(server.url);
            list.appendChild(item);
            checkServerHealth(server.url, item);
        });

        // Add Autoswitch Toggle
        const isAutoswitch = localStorage.getItem('wispAutoswitch') !== 'false';
        const toggleContainer = document.createElement('div');
        toggleContainer.className = 'wisp-option';
        toggleContainer.style.cssText = 'margin-top: 10px; cursor: default;';
        toggleContainer.innerHTML = `
            <div class="wisp-option-header" style="justify-content: space-between;">
                <div class="wisp-option-name"><i class="fa-solid fa-rotate" style="margin-right:8px"></i> Auto-switch on failure</div>
                <div class="toggle-switch ${isAutoswitch ? 'active' : ''}" id="autoswitch-toggle">
                    <div class="toggle-knob"></div>
                </div>
            </div>
        `;

        toggleContainer.onclick = () => {
            const newState = !isAutoswitch;
            localStorage.setItem('wispAutoswitch', newState);
            document.getElementById('autoswitch-toggle').classList.toggle('active', newState);

            navigator.serviceWorker.controller?.postMessage({ type: 'config', autoswitch: newState });
            notify('success', 'Settings Saved', `Autoswitch ${newState ? 'Enabled' : 'Disabled'}`);
            location.reload();
        };

        list.appendChild(toggleContainer);
    }

    function saveCustomWisp() {
        const input = document.getElementById('custom-wisp-input');
        const url = input.value.trim();

        if (!url) return;
        if (!url.startsWith('ws://') && !url.startsWith('wss://')) {
            notify('error', 'Invalid URL', 'URL must start with wss:// or ws://');
            return;
        }

        const customWisps = getStoredWisps();
        if (customWisps.some(w => w.url === url) || WISP_SERVERS.some(w => w.url === url)) {
            notify('warning', 'Already Exists', 'This server is already in the list.');
            return;
        }

        const newServer = { name: `Custom ${customWisps.length + 1}`, url };
        customWisps.push(newServer);
        localStorage.setItem('customWisps', JSON.stringify(customWisps));
        
        // Switch to the newly added server
        setWisp(url);
        
        input.value = '';
    }

    window.deleteCustomWisp = function (urlToDelete) {
        if (!confirm("Remove this server?")) return;

        let customWisps = getStoredWisps().filter(w => w.url !== urlToDelete);
        localStorage.setItem('customWisps', JSON.stringify(customWisps));

        if (localStorage.getItem('proxServer') === urlToDelete) {
            setWisp(DEFAULT_WISP);
        } else {
            renderServerList();
        }
    };

    async function checkServerHealth(url, element) {
        const dot = element.querySelector('.status-indicator');
        const text = element.querySelector('.ping-text');
        const start = Date.now();

        const markOffline = () => {
            dot.classList.add('status-error');
            text.textContent = "Offline";
        };

        try {
            const controller = new AbortController();
            const timeout = setTimeout(() => controller.abort(), 2000);
            
            await fetch(url.replace('wss://', 'https://').replace('/wisp/', '/health') || url, {
                method: 'HEAD',
                signal: controller.signal,
                mode: 'no-cors'
            });
            
            clearTimeout(timeout);
            dot.classList.add('status-success');
            text.textContent = `${Date.now() - start}ms`;
        } catch {
            // Fallback: quick WebSocket test
            try {
                const wsTest = new WebSocket(url);
                wsTest.onopen = () => {
                    dot.classList.add('status-success');
                    text.textContent = `${Date.now() - start}ms`;
                    wsTest.close();
                };
                wsTest.onerror = markOffline;
                
                setTimeout(() => {
                    if (wsTest.readyState !== WebSocket.OPEN) {
                        wsTest.close();
                        markOffline();
                    }
                }, 1000);
            } catch { markOffline(); }
        }
    }

    function setWisp(url) {
        const oldUrl = localStorage.getItem('proxServer');
        localStorage.setItem('proxServer', url);

        if (oldUrl !== url) {
            const serverName = [...WISP_SERVERS, ...getStoredWisps()].find(s => s.url === url)?.name ?? 'Custom Server';
            notify('success', 'Proxy Changed', `Switching to ${serverName}...`);
        }

        navigator.serviceWorker.controller?.postMessage({ type: 'config', wispurl: url });
        setTimeout(() => location.reload(), 600);
    }

    // =====================================================
    // UTILITIES
    // =====================================================
    function hideErudaEntryBtn(win) {
        // Eruda renders its entry button inside a Shadow DOM, so <style> injection
        // can't reach it. We must pierce the shadowRoot and manipulate the element directly.
        const attempt = (tries) => {
            try {
                const container = win.document.getElementById('eruda');
                if (!container) {
                    if (tries > 0) setTimeout(() => attempt(tries - 1), 80);
                    return;
                }
                // Try direct child first, then shadow root
                const root = container.shadowRoot || container;
                const btn = root.querySelector('.eruda-entry-btn');
                if (btn) {
                    btn.style.cssText += 'display:none!important;visibility:hidden!important;pointer-events:none!important;';
                } else if (tries > 0) {
                    setTimeout(() => attempt(tries - 1), 80);
                }
            } catch {}
        };
        attempt(10); // retry up to 10×80ms = 800ms
    }

    function toggleDevTools() {
        const tab = getActiveTab();
        const win = tab?.frame.frame.contentWindow;
        if (!win) return;

        // If eruda is loaded, toggle its visibility
        if (win.eruda) {
            const panel = win.eruda._shadowRoot || win.document.querySelector('.__chobitsu-hide__') || win.eruda._container;
            // eruda stores its open state; use its own show/hide API
            if (tab._erudaOpen) {
                win.eruda.hide();
                tab._erudaOpen = false;
            } else {
                win.eruda.show();
                hideErudaEntryBtn(win);
                tab._erudaOpen = true;
            }
            return;
        }

        // Load eruda for the first time then show it
        const script = win.document.createElement('script');
        script.src = "https://cdn.jsdelivr.net/npm/eruda";
        script.onload = () => {
            win.eruda.init();
            win.eruda.show();
            hideErudaEntryBtn(win);
            tab._erudaOpen = true;
        };
        win.document.body.appendChild(script);
    }

    async function checkHashParameters() {
        if (window.location.hash) {
            const hash = decodeURIComponent(window.location.hash.substring(1));
            if (hash) handleSubmit(hash);
            history.replaceState(null, null, location.pathname);
        }
    }

    // =====================================================
    // MAIN INITIALIZATION
    // =====================================================
    document.addEventListener('DOMContentLoaded', async function () {
        try {
            // Load remote wisp server list first
            await fetchWispServers();

            // Proactively find the best server before initializing
            await initializeWithBestServer();
            
            await getSharedScramjet();
            await getSharedConnection();

            if ('serviceWorker' in navigator) {
                const reg = await navigator.serviceWorker.register(getBasePath() + 'sw.js', { scope: getBasePath() });
                
                // Wait for SW to be ready
                await navigator.serviceWorker.ready;
                
                const wispUrl = localStorage.getItem("proxServer") ?? DEFAULT_WISP;
                const allServers = getAllWispServers();
                const autoswitch = localStorage.getItem('wispAutoswitch') !== 'false';
                
                const swConfig = {
                    type: "config",
                    wispurl: wispUrl,
                    servers: allServers,
                    autoswitch: autoswitch
                };

                // Send config to SW
                const sendConfig = async () => {
                    const sw = reg.active || navigator.serviceWorker.controller;
                    if (sw) {
                        console.log("Sending config to SW:", swConfig);
                        sw.postMessage(swConfig);
                    }
                };

                // Try sending immediately, then retry if needed
                sendConfig();
                setTimeout(sendConfig, 500);
                setTimeout(sendConfig, 1500);

                navigator.serviceWorker.addEventListener('message', (event) => {
                    const { type, url, name, message } = event.data;
                    if (type === 'wispChanged') {
                        console.log("SW reported Wisp Change:", event.data);
                        localStorage.setItem("proxServer", url);
                        notify('info', 'Autoswitched Proxy', `Now using ${name} because the previous server was slow or offline.`);
                    } else if (type === 'wispError') {
                        console.error("SW reported Wisp Error:", event.data);
                        notify('error', 'Proxy Error', message);
                    }
                });

                reg.update();
            }

            await initializeBrowser();
        } catch (err) {
            console.error("Initialization error:", err);
            // Show error to user if initialization fails
            const root = document.getElementById('app');
            if (root) {
                root.innerHTML = `
                    <div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:var(--font);background:var(--bg);color:var(--text-primary);">
                        <div style="text-align:center;max-width:500px;width:90%;padding:32px;background:var(--card-bg);border:1px solid var(--accent);border-radius:16px;box-shadow:0 0 60px var(--accent-glow),0 0 20px rgba(0,0,0,0.8);backdrop-filter:blur(10px);">
                            <div style="font-size:2rem;color:var(--accent);margin-bottom:16px;text-shadow:0 0 20px var(--accent-glow)">⚠</div>
                            <h1 style="color:var(--accent);margin-bottom:16px;font-size:1.2rem;letter-spacing:1px;text-transform:uppercase;font-family:var(--font);text-shadow:0 0 10px var(--accent-glow);">Init Error</h1>
                            <p style="margin-bottom:20px;line-height:1.7;color:var(--text-dim);font-size:0.85rem;font-family:var(--font);">${err.message || 'Unknown error during initialization'}</p>
                            <p style="color:var(--text-dim);font-size:0.8rem;margin-bottom:20px;letter-spacing:1px;text-transform:uppercase;font-family:var(--font);">Check console (F12) for details</p>
                            <button onclick="location.reload()" style="padding:14px 32px;background:var(--accent);color:#000;border:none;border-radius:8px;cursor:pointer;font-family:var(--font);font-weight:bold;font-size:0.75rem;letter-spacing:1px;text-transform:uppercase;transition:0.2s;">Retry</button>
                        </div>
                    </div>
                `;
            }
        }
    });
  </script>
